name: maternal_triage
description: Explainable AI-Based Maternal Triage Decision-Support System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.0

  # AI / Data
  onnxruntime: ^1.4.1
  fl_chart: ^1.2.0

  # Navigation & Connectivity
  go_router: ^13.0.1
  connectivity_plus: ^5.0.2

  # UI / Utilities
  toastification: ^3.0.3
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  flutter_hooks: ^0.21.3+1
  equatable: ^2.0.8
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  formz: ^0.8.0
  email_validator: ^3.0.0
  logger: ^2.6.2
  dio: ^5.9.2
  google_fonts: ^8.0.2
  lottie: ^3.3.2
  flutter_svg: ^2.0.17
  timeago: ^3.7.1
  flutter_dotenv: ^6.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.12.2
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  smooth_page_indicator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/models/
    - assets/shap/
    - assets/scaler/
    - assets/animations/
    